<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Submit information — Telos House</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app-config.js"></script>
<style>
  :root{ --ink:#1a2238; --ink-faded:#7a8199; --line:#e3e7f0; --bg:#f6f8fc; --card:#fff; --accent:#3b5bdb; --accent-soft:#eef2ff; --green:#2f9e44; --red:#e03131; --amber:#f08c00; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); padding:18px; }
  .wrap{ max-width:560px; margin:0 auto; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:22px; }
  h1{ font-size:19px; margin:0 0 4px; }
  .sub{ font-size:13px; color:var(--ink-faded); margin:0 0 18px; }
  .field{ margin-bottom:16px; }
  label{ display:block; font-size:13px; font-weight:600; margin-bottom:5px; }
  .help{ font-size:11.5px; color:var(--ink-faded); margin-top:3px; }
  input[type=text], input[type=number], textarea, select{ width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:9px; font-size:14px; font-family:inherit; }
  textarea{ min-height:70px; resize:vertical; }
  input[type=file]{ font-size:13px; }
  .filebtn{ display:inline-flex; align-items:center; gap:6px; padding:9px 12px; border:1px dashed var(--line); border-radius:9px; cursor:pointer; font-size:13px; background:var(--accent-soft); color:var(--accent); }
  .filebtn input{ display:none; }
  .filename{ font-size:12px; color:var(--green); margin-top:6px; }
  button.submit{ width:100%; padding:12px; border:none; border-radius:10px; background:var(--accent); color:#fff; font-size:15px; font-weight:600; cursor:pointer; margin-top:8px; }
  button.submit:disabled{ opacity:.5; cursor:default; }
  .msg{ padding:12px; border-radius:9px; font-size:13px; margin-top:14px; }
  .msg.ok{ background:#ebfbee; color:var(--green); }
  .msg.err{ background:#fff0f0; color:var(--red); }
  .done{ text-align:center; padding:30px 10px; }
  .done .tick{ font-size:42px; }
  .brand{ font-size:11px; color:var(--ink-faded); text-align:center; margin-top:16px; letter-spacing:.4px; text-transform:uppercase; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="card">
    <div id="loading" class="sub">Loading…</div>
    <form id="form" style="display:none" onsubmit="return false">
      <h1 id="title">Submit information</h1>
      <p class="sub" id="subtitle"></p>
      <div id="autofill"></div>
      <div id="fields"></div>
      <button class="submit" id="submitBtn" onclick="submitForm()">Submit</button>
      <div id="msg"></div>
    </form>
    <div id="doneView" class="done" style="display:none">
      <div class="tick">✓</div>
      <h1>Thank you</h1>
      <p class="sub">Your information has been submitted. You can close this page.</p>
    </div>
  </div>
  <div class="brand">Telos House · refund tracker</div>
</div>

<script>
"use strict";
let SB = null, DEF = null;

function qs(name){ return new URLSearchParams(location.search).get(name); }
function decodeDef(s){
  try { return JSON.parse(decodeURIComponent(escape(atob(s.replace(/-/g,'+').replace(/_/g,'/'))))); }
  catch(e){ return null; }
}
// Native <input type="date"> uses ISO; the app stores/displays DD/MM/YYYY. Convert between them.
function parseDateLoose(s){ if(!s) return null; s=String(s).trim(); if(!s) return null; var m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/); if(m){ var d=+m[1],mo=+m[2],y=+m[3]; if(y<100)y+=2000; var dt=new Date(y,mo-1,d); return isNaN(dt.getTime())?null:dt; } var dt2=new Date(s); return isNaN(dt2.getTime())?null:dt2; }
function isoToUK(iso){ var m=String(iso||'').trim().match(/^(\d{4})-(\d{2})-(\d{2})$/); return m?(m[3]+'/'+m[2]+'/'+m[1]):(iso||''); }
function addWorkingDays(fromDate, n){ var d=new Date(fromDate.getTime()); var added=0; while(added<n){ d.setDate(d.getDate()+1); var day=d.getDay(); if(day!==0&&day!==6) added++; } function pad(x){return String(x).padStart(2,'0');} return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear(); }
function toggleDeadlineDate(i, val){ var w=document.getElementById('fld'+i+'_wrap'); if(w) w.style.display=(val==='yes')?'block':'none'; }

function init(){
  const cfg = window.APP_CONFIG || {};
  if(!cfg.url || !cfg.anonKey){ showFatal('This form is not configured. (Missing Supabase settings.)'); return; }
  SB = window.supabase.createClient(cfg.url, cfg.anonKey);

  const d = qs('d');                 // base64 form definition
  DEF = d ? decodeDef(d) : null;
  if(!DEF || !DEF.order || !Array.isArray(DEF.fields)){ showFatal('This form link is invalid or incomplete.'); return; }

  document.getElementById('loading').style.display='none';
  document.getElementById('form').style.display='';
  document.getElementById('title').textContent = DEF.title || ('Information needed for order ' + DEF.order);
  document.getElementById('subtitle').textContent = DEF.subtitle || ('Order #' + DEF.order + (DEF.store ? ' · ' + DEF.store : '') + (DEF.person ? ' · for ' + DEF.person : ''));
  renderFields();
  renderAutofill();
}

// Optional: the submitter can upload the order confirmation email/PDF, and we read it with AI to
// pre-fill the form. This is ALWAYS optional — the confirmation is never required to submit.
function renderAutofill(){
  const box = document.getElementById('autofill'); if(!box) return;
  box.innerHTML =
    '<div style="border:1px dashed var(--accent); background:var(--accent-soft); border-radius:10px; padding:12px; margin-bottom:16px">'
    + '<div style="font-weight:600; font-size:13px; margin-bottom:4px">⚡ Fill this in automatically (optional)</div>'
    + '<div style="font-size:12px; color:var(--ink-faded); margin-bottom:8px">Have the order confirmation email or PDF? Upload it and we’ll read the details and fill the form in for you. You can still edit anything afterwards — and you don’t have to use this.</div>'
    + '<label class="filebtn">📎 <span id="acfBtn">Upload order confirmation</span><input type="file" accept="image/*,application/pdf" onchange="onConfirmationFile(this)"></label>'
    + '<div class="filename" id="acfMsg" style="color:var(--ink-faded)"></div>'
    + '</div>';
}

let CONFIRMATION_FILE = null;
async function onConfirmationFile(input){
  const file = input.files[0]; if(!file) return;
  const msg = document.getElementById('acfMsg');
  const btn = document.getElementById('acfBtn');
  btn.textContent = 'Reading…'; msg.style.color = 'var(--ink-faded)'; msg.textContent = 'Reading the document…';
  const r = new FileReader();
  r.onload = async ()=>{
    try {
      const dataUrl = r.result;
      const comma = dataUrl.indexOf(',');
      const meta = dataUrl.slice(0, comma);
      const b64 = dataUrl.slice(comma+1);
      const mt = (meta.match(/data:([^;]+)/)||[])[1] || file.type || 'application/octet-stream';
      // keep the file so it's attached as the order confirmation on submit (optional, never required)
      CONFIRMATION_FILE = { dataUrl, name:file.name, type:mt };
      const resp = await fetch('/api/ai', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ task:'parse_order', image_base64:b64, media_type:mt }) });
      if(!resp.ok) throw new Error('parse failed');
      const data = await resp.json();
      const fields = (data && data.fields) || {};
      let filled = 0;
      DEF.fields.forEach((f,i)=>{
        if(f.kind === 'file') return;
        const val = fields[f.key];
        if(val !== undefined && val !== null && val !== '' && val !== 0){
          const el = document.getElementById('fld'+i);
          if(el && !el.value){ el.value = (f.kind==='number') ? val : String(val); filled++; }
        }
      });
      btn.textContent = '✓ ' + file.name;
      msg.style.color = 'var(--green)';
      msg.textContent = filled ? ('Filled in ' + filled + ' field' + (filled>1?'s':'') + ' — please check them and add anything still missing.') : 'Uploaded and attached. Couldn’t auto-read the fields — please fill the form in manually.';
    } catch(e){
      btn.textContent = 'Upload order confirmation';
      msg.style.color = 'var(--red)';
      msg.textContent = 'Couldn’t read that automatically — you can still fill the form in manually and submit.';
    }
  };
  r.readAsDataURL(file);
}

function renderFields(){
  const box = document.getElementById('fields');
  box.innerHTML = DEF.fields.map((f,i)=>{
    const help = f.help ? '<div class="help">'+esc(f.help)+'</div>' : '';
    // Special: the notify-retailer form reframes the deadline as "Was a deadline given?"
    // Yes -> reveal a calendar picker; No -> the app assumes 5 working days.
    if(f.key === 'investigation_deadline' && DEF.task === 'contact_retailer_investigation'){
      return '<div class="field"><label>Was an investigation deadline given?'+(f.required?' *':'')+'</label>'
        + '<select id="fld'+i+'_given" onchange="toggleDeadlineDate('+i+', this.value)">'
        + '<option value="">(select)</option>'
        + '<option value="yes">Yes — they gave a date</option>'
        + '<option value="no">No — assume 5 working days from the date you contacted them</option>'
        + '</select>'
        + '<div id="fld'+i+'_wrap" style="display:none;margin-top:8px"><label style="font-weight:500">Investigation deadline date</label><input type="date" id="fld'+i+'"></div>'
        + help + '</div>';
    }
    let input;
    if(f.kind === 'file'){
      input = '<label class="filebtn">📎 <span id="fbtn'+i+'">Choose file</span>'
            + '<input type="file" accept="'+(f.accept||'image/*,application/pdf')+'" onchange="onFile('+i+', this)"></label>'
            + '<div class="filename" id="fname'+i+'"></div>';
    } else if(f.kind === 'select'){
      input = '<select id="fld'+i+'"><option value="">(select)</option>'
            + (f.options||[]).filter(Boolean).map(o=>'<option value="'+esc(o)+'">'+esc(o)+'</option>').join('')
            + '</select>';
    } else if(f.kind === 'textarea'){
      input = '<textarea id="fld'+i+'" placeholder="'+esc(f.placeholder||'')+'"></textarea>';
    } else if(f.kind === 'date'){
      input = '<input type="date" id="fld'+i+'">';
    } else {
      input = '<input type="'+(f.kind==='number'?'number':'text')+'" id="fld'+i+'" placeholder="'+esc(f.placeholder||'')+'">';
    }
    return '<div class="field"><label>'+esc(f.label||f.key)+(f.required?' *':'')+'</label>'+input+help+'</div>';
  }).join('');
}

const FILES = {}; // index -> { dataUrl, name, type }
function onFile(i, input){
  const file = input.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = ()=>{ FILES[i] = { dataUrl:r.result, name:file.name, type:file.type };
    document.getElementById('fname'+i).textContent = '✓ ' + file.name;
    document.getElementById('fbtn'+i).textContent = 'Replace file';
  };
  r.readAsDataURL(file);
}

async function submitForm(){
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');
  msg.className=''; msg.textContent='';
  // collect
  const answers = {};      // field key -> text value
  const fileUploads = [];  // { key, dataUrl, name, type }
  // If the submitter uploaded the order confirmation for auto-fill, attach it too (optional).
  if(CONFIRMATION_FILE){ fileUploads.push({ key:'order_confirmation', dataUrl:CONFIRMATION_FILE.dataUrl, name:CONFIRMATION_FILE.name, type:CONFIRMATION_FILE.type }); }
  for(let i=0;i<DEF.fields.length;i++){
    const f = DEF.fields[i];
    if(f.kind === 'file'){
      if(FILES[i]) fileUploads.push(Object.assign({ key:f.key }, FILES[i]));
      else if(f.required){ return fail('Please attach: ' + (f.label||f.key)); }
      continue;
    }
    // Special: "Was a deadline given?" — No assumes 5 working days from the contact date.
    if(f.key === 'investigation_deadline' && DEF.task === 'contact_retailer_investigation'){
      const given = (document.getElementById('fld'+i+'_given')||{}).value || '';
      if(given === 'no'){
        const base = parseDateLoose(answers['retailer_contacted_date']) || new Date();
        answers['investigation_deadline'] = addWorkingDays(base, 5);
      } else if(given === 'yes'){
        const dv = (document.getElementById('fld'+i)||{}).value || '';
        if(dv) answers['investigation_deadline'] = isoToUK(dv);
        else return fail('Please pick the investigation deadline date, or choose “No”.');
      } else if(f.required){
        return fail('Please answer: Was an investigation deadline given?');
      }
      continue;
    }
    const el = document.getElementById('fld'+i);
    let v = el ? el.value.trim() : '';
    if(f.kind === 'date' && v) v = isoToUK(v);
    if(f.required && !v){ return fail('Please fill in: ' + (f.label||f.key)); }
    if(v) answers[f.key] = v;
  }
  // Chase investigation: Notes is required unless the retailer's question & your answer were logged.
  if(DEF.task === 'chase_investigation'){
    const q=(answers['retailer_question']||'').trim(), a=(answers['retailer_response']||'').trim(), n=(answers['issue_notes']||'').trim();
    if(!q && !a && !n){ return fail('Please log the retailer’s question & your answer, or fill in Notes.'); }
  }
  btn.disabled = true; btn.textContent = 'Submitting…';
  try{
    // 1) upload files to the labels bucket at the same path the app reads: {order}/{field}.{ext}
    const filePaths = {};
    for(const u of fileUploads){
      const [meta, b64] = u.dataUrl.split(',');
      const type = (meta.match(/data:([^;]+)/)||[])[1] || 'application/octet-stream';
      const ext = type.includes('pdf') ? 'pdf' : (type.split('/')[1] || 'bin');
      const path = DEF.order + '/' + u.key + '.' + ext;
      const bytes = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
      const up = await SB.storage.from('labels').upload(path, bytes, { contentType:type, upsert:true });
      if(up.error) throw up.error;
      filePaths[u.key] = { path, filename:u.name, filetype:type, size:bytes.length };
    }
    // 2) record one submission row (the app reads this and merges into the order)
    const payload = {
      order_id: DEF.order,
      task: DEF.task || '',
      access_class: DEF.cls || '',
      submitted_by: DEF.person || '',
      answers: answers,
      files: filePaths,
      token: DEF.token || '',
      processed: false
    };
    const ins = await SB.from('submissions').insert(payload);
    if(ins.error) throw ins.error;
    // success
    document.getElementById('form').style.display='none';
    document.getElementById('doneView').style.display='';
  }catch(e){
    fail('Submission failed: ' + (e.message || e) + '. Please try again, or contact whoever sent you this link.');
    btn.disabled = false; btn.textContent = 'Submit';
  }
}

function fail(t){ const m=document.getElementById('msg'); m.className='msg err'; m.textContent=t; return false; }
function showFatal(t){ document.getElementById('loading').style.display='none'; const c=document.getElementById('card'); c.innerHTML='<h1>Unable to load</h1><p class="sub">'+esc(t)+'</p>'; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
</script>
</body>
</html>
